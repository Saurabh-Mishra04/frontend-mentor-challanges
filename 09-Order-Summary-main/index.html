<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Order summary card</title>
</head>
<body>                        
  <main>
    <section>
      <img src="./images/illustration-hero.svg" alt="hero_img" class="hero_img">
      <div class="order">
        <h1>Order Summary</h1>
        <p>You can now listen to millions of songs, audiobooks, and podcasts on any 
        device anywhere you like!</p>
      </div>
      <div class="plan">
        <img src="./images/icon-music.svg" alt="icon">
        <div class="price">
          <h3>Annual Plan</h3>
          <p>$59.99/year</p>
        </div>
        <a href="https://github.com/Saurabh-Mishra04" target="_blank">Change</a>
      </div>  
      <div class="bottom">
        <button>
        <a href="https://github.com/Saurabh-Mishra04" target="_blank">Proceed to Payment</a>
        </button>
        <p>
          <a href="https://github.com/Saurabh-Mishra04" target="_blank">Cancel Order</a>
        </p>
      </div>
    </section>
  </main>
</body>
</html>
